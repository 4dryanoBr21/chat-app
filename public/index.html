<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" type=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" type=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <title>Chat do Lambari</title>
</head>
<body>
    <form id="chat">
        <input type="text" name="username" placeholder="Digit seu usuário">
        <div class="menssages"></div>
        <input type="text" name="message" placeholder="Digite sua mensagen">
        <button type="submit">Enviar</button>
    </form>

    <script type="text/javascript">
        var socket = io('http://localhost:3000');

        $('#chat').submit(function(envent) {
            event.preventDefault();

            var author = $('input[name=username]');
            var message = $('input[name=message]');

            if (author.length && message.length) {
                var messageObject = {
                    author: author,
                    message: message,
                };

                socket.emit('sendMessage', messageObject);
            }
        });
    </script>
</body>
</html>
