<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" type=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" type=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="salmao.png" type="image/x-icon">
    <title>Chat do Lambari</title>
</head>
<body>
    <div class="container">
        <img class="rounded mx-auto d-block" src="imgs/salmao.png" alt="">
        <h1>Chat do Lambari</h1>
        <div class="col"></div>
        <div class="col">
            <div class="chat-ct">
                <form id="chat">
                    <div class="messages"></div>
                    <div class="d-grid gap-2">
                        <input class="form-control" type="text" name="username" placeholder="Digit seu usuário">
                        <input class="form-control" type="text" name="message" placeholder="Digite sua mensagen">
                        <button class="btn btn-dark" type="submit">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="col"></div>
    </div>

    <script type="text/javascript">
        var socket = io('http://localhost:3000');

        function renderMessage(message) {
            $('.messages').append('<div class="message"><strong>'+ message.author +'</strong>: '+ message.message +'</div>');
        }

        socket.on('previousMessages', function(messages) {
            for (message of messages) {
                renderMessage(message);
            }
        })

        socket.on('newMessage', function(message) {
            renderMessage(message);
        });

        $('#chat').submit(function(event) {
            event.preventDefault();

            var author = $('input[name=username]');
            var message = $('input[name=message]');

            if (author.length && message.length) {
                var messageObject = {
                    author: author.val(),
                    message: message.val(),
                };

                renderMessage(messageObject);

                socket.emit('sendMessage', messageObject);
            }
        });
    </script>
</body>
</html>
